<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com;">
  <title>Fanbook Preview — LBH Global Fan Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@400;600;700&family=Lato:wght@300;400;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-size: min(90vw, 90vh, 700px);
      --font-display: 'Dancing Script', cursive;
      --font-serif: 'Cormorant Garamond', serif;
      --font-body: 'Lato', 'Noto Sans Thai', sans-serif;
      --bg: #ebe8e4;
      --surface: #fff;
      --accent: #3a2f2a;
      --accent-light: #8a7d74;
      --brown: #7a5c3e;
      --gold: #c4a265;
      --border: #e0d8ce;
      --shadow: rgba(0,0,0,0.08);
      --private-bg: #fff3f3;
      --private-border: #e8b4b4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--accent);
      min-height: 100vh;
    }

    /* Top bar */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .top-bar h1 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--brown);
    }
    .top-actions { display: flex; gap: 8px; align-items: center; }
    .top-actions button, .top-actions a {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--accent);
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      font-family: var(--font-body);
      transition: all 0.2s;
    }
    .top-actions button:hover, .top-actions a:hover {
      background: var(--brown);
      color: #fff;
      border-color: var(--brown);
    }
    .badge-private {
      background: var(--private-bg);
      color: #c44;
      border: 1px solid var(--private-border);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .admin-indicator {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* Page navigation */
    .page-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 12px;
    }
    .page-nav button {
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .page-nav button:hover { background: var(--brown); color: #fff; }
    .page-nav button:disabled { opacity: 0.3; cursor: default; }
    .page-counter { font-size: 0.85rem; color: var(--accent-light); min-width: 80px; text-align: center; }

    /* Ebook page container */
    .ebook-viewport {
      display: flex; justify-content: center; padding: 20px 20px 40px;
    }
    .ebook-page {
      width: var(--page-size);
      height: var(--page-size);
      background: var(--surface);
      border-radius: 8px;
      box-shadow: 0 4px 30px var(--shadow), 0 1px 3px rgba(0,0,0,0.06);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Page types */
    .page-continent {
      background: #1e1e2e;
      color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }
    .page-continent .emoji { font-size: clamp(3rem, 8vw, 5rem); margin-bottom: 12px; }
    .page-continent .title {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      font-weight: 600; letter-spacing: 0.05em;
    }
    .page-continent .subtitle {
      font-size: clamp(0.8rem, 2vw, 1rem);
      color: #c8c4d0; margin-top: 8px; font-style: italic;
    }
    .page-continent .stats { font-size: 0.85rem; color: #9a96a6; margin-top: 20px; }

    .page-country {
      background: #f8f4ee;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }
    .page-country .flag { font-size: clamp(3rem, 8vw, 5rem); }
    .page-country .name {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      margin-top: 8px; font-weight: 600;
    }
    .page-country .count {
      font-size: 0.9rem; color: var(--accent-light); margin-top: 8px;
    }

    /* Track B - Photo + Message */
    .page-trackB { padding: 12px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-start; }
    .trackB-entry {
      display: flex; gap: 12px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .trackB-entry:last-child { border-bottom: none; padding-bottom: 0; }
    .trackB-photo {
      flex-shrink: 0; width: 35%; max-width: 200px;
      border-radius: 6px; overflow: hidden;
      align-self: flex-start;
    }
    .trackB-photo img { width: 100%; display: block; object-fit: contain; }
    .trackB-info { flex: 1; min-width: 0; overflow: hidden; }
    .trackB-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .trackB-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      overflow: hidden; border: 2px solid var(--border);
      flex-shrink: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: var(--accent-light);
    }
    .trackB-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .trackB-name { font-weight: 600; font-size: 0.95rem; }
    .trackB-country { font-size: 0.78rem; color: var(--accent-light); }
    .trackB-contact { font-size: 0.72rem; color: var(--accent-light); margin-top: 1px; }
    .trackB-contact a { color: var(--brown); text-decoration: none; }
    .trackB-msg { font-size: 0.85rem; line-height: 1.6; color: var(--accent); overflow: hidden; }
    .trackB-msg-en { font-size: 0.78rem; color: var(--accent-light); font-style: italic; margin-top: 4px; overflow: hidden; }

    /* Track A with Profile */
    .page-trackA { padding: 12px 16px; overflow: hidden; }
    .page-trackA .country-label {
      text-align: center; font-size: 0.75rem; color: var(--accent-light);
      margin-bottom: 10px; font-style: italic;
    }
    .trackA-entry {
      display: flex; gap: 12px; margin-bottom: 10px;
      padding-bottom: 10px; border-bottom: 1px solid #f0ece6;
    }
    .trackA-entry:last-child { border-bottom: none; }
    .trackA-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      overflow: hidden; border: 2px solid var(--border);
      flex-shrink: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: var(--accent-light);
    }
    .trackA-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .trackA-content { flex: 1; min-width: 0; }
    .trackA-name { font-weight: 600; font-size: 0.9rem; }
    .trackA-contact { font-size: 0.72rem; color: var(--accent-light); }
    .trackA-contact a { color: var(--brown); text-decoration: none; }
    .trackA-msg { font-size: 0.82rem; line-height: 1.55; margin-top: 2px; overflow: hidden; }
    .trackA-msg-en { font-size: 0.75rem; color: var(--accent-light); font-style: italic; margin-top: 2px; overflow: hidden; }

    /* Track A Text Only */
    .page-trackATxt { padding: 12px 16px; overflow: hidden; }
    .page-trackATxt .country-label {
      text-align: center; font-size: 0.75rem; color: var(--accent-light);
      margin-bottom: 8px; font-style: italic;
    }
    .trackATxt-entry { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #f0ece6; }
    .trackATxt-entry:last-child { border-bottom: none; }
    .trackATxt-name { font-weight: 600; font-size: 0.85rem; }
    .trackATxt-contact { font-size: 0.7rem; color: var(--accent-light); }
    .trackATxt-contact a { color: var(--brown); text-decoration: none; }
    .trackATxt-msg { font-size: 0.8rem; line-height: 1.5; margin-top: 2px; overflow: hidden; }
    .trackATxt-msg-en { font-size: 0.72rem; color: var(--accent-light); font-style: italic; margin-top: 2px; overflow: hidden; }

    /* Track C - Custom Page */
    .page-trackC { padding: 0; position: relative; display: flex; flex-direction: column; overflow: hidden; }
    .trackC-image { flex: 1; overflow: hidden; min-height: 0; }
    .trackC-image img { width: 100%; height: 100%; object-fit: contain; background: #f8f8f8; }
    .trackC-info {
      padding: 8px 16px;
      background: rgba(255,255,255,0.95);
      border-top: 1px solid var(--border);
    }
    .trackC-name { font-weight: 600; font-size: 0.85rem; }
    .trackC-country { font-size: 0.7rem; color: var(--accent-light); }
    .trackC-contact { font-size: 0.62rem; color: var(--accent-light); margin-top: 1px; }
    .trackC-contact a { color: var(--brown); text-decoration: none; }
    .trackC-msg { font-size: 0.72rem; line-height: 1.5; margin-top: 4px; }

    /* Loading */
    .loading-wrap {
      display: flex; align-items: center; justify-content: center;
      height: 60vh; flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--brown);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Print styles */
    @media print {
      body { background: #fff; }
      .top-bar, .page-nav, .fb-sidebar, .toc-overlay { display: none !important; }
      .fb-layout { display: block !important; }
      .ebook-viewport {
        padding: 0;
        display: block !important;
      }
      .all-pages-print {
        display: block !important;
      }
      .all-pages-print .ebook-page {
        width: 700px; height: 700px;
        box-shadow: none;
        border: none;
        page-break-after: always;
        page-break-inside: avoid;
        break-after: page;
        border-radius: 0;
        margin: 0 auto;
        overflow: hidden;
      }
      .ebook-page {
        width: 700px; height: 700px;
        box-shadow: none; border: 1px solid #ddd;
        page-break-after: always;
        border-radius: 0;
        overflow: visible;
      }
    }

    /* TOC sidebar */
    .toc-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.4);
    }
    .toc-overlay.active { display: block; }
    .toc-panel {
      position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
      background: var(--surface); z-index: 201;
      overflow-y: auto; padding: 20px;
      box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    }
    .toc-panel h3 { font-size: 0.9rem; margin-bottom: 12px; color: var(--brown); }
    .toc-item {
      display: block; padding: 6px 10px; font-size: 0.78rem;
      cursor: pointer; border-radius: 6px;
      color: var(--accent); text-decoration: none;
    }
    .toc-item:hover { background: var(--bg); }
    .toc-continent { font-weight: 600; margin-top: 10px; font-size: 0.82rem; }
    .toc-country { padding-left: 20px; font-size: 0.75rem; }

    /* ===== Country Timeline Sidebar ===== */
    .fb-layout { display: flex; min-height: calc(100vh - 100px); }
    .fb-sidebar {
      width: 200px;
      flex-shrink: 0;
      position: sticky;
      top: 50px;
      align-self: flex-start;
      max-height: calc(100vh - 60px);
      overflow-y: auto;
      padding: 12px 0 12px 6px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .fb-sidebar::-webkit-scrollbar { width: 4px; }
    .fb-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .fb-sidebar-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-light);
      padding: 0 10px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .fb-sidebar-list {
      list-style: none; padding: 0; margin: 0;
      position: relative;
    }
    .fb-sidebar-list::before {
      content: '';
      position: absolute;
      left: 14px; top: 0; bottom: 0;
      width: 2px;
      background: var(--border);
      border-radius: 2px;
    }
    .fb-sb-item {
      position: relative;
      padding: 5px 8px 5px 30px;
      font-size: 0.75rem;
      color: var(--accent-light);
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fb-sb-item::before {
      content: '';
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--border);
      transition: all 0.3s ease;
      z-index: 1;
    }
    .fb-sb-item:hover { background: var(--bg); color: var(--accent); }
    .fb-sb-item.active {
      color: var(--brown);
      font-weight: 600;
      background: rgba(139,109,76,0.08);
    }
    .fb-sb-item.active::before {
      background: var(--brown);
      border-color: var(--brown);
      box-shadow: 0 0 0 3px rgba(139,109,76,0.15);
    }
    .fb-sb-continent {
      font-weight: 700;
      font-size: 0.72rem;
      color: var(--accent);
      padding: 8px 8px 4px 10px;
      margin-top: 4px;
      letter-spacing: 0.03em;
    }
    .fb-main { flex: 1; min-width: 0; }
    @media (max-width: 900px) {
      .fb-sidebar { display: none; }
      .fb-layout { display: block; }
    }

    /* Clickable images */
    .trackB-photo img, .trackC-image img { cursor: zoom-in; }

    /* Lightbox overlay */
    .lightbox-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.85);
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .lightbox-overlay.active { display: flex; }
    .lightbox-overlay img {
      max-width: 92vw; max-height: 92vh; object-fit: contain;
      border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js" integrity="sha384-Cck14aA9cifjYolcnjebXRfWGkz5ltHMBiG4px/j8GS+xQcb7OhNQWZYyWjQ+UwQ" crossorigin="anonymous"></script>
</head>

  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:12px;">
      <h1>LBH Global Fanbook</h1>
      <span id="admin-badge" style="display:none;" class="admin-indicator">ADMIN MODE</span>
    </div>
    <div class="top-actions">
      <button onclick="toggleTOC()">Contents</button>
      <button onclick="printAllPages()">Export PDF</button>
      <button onclick="exportPptx()" id="btn-pptx">Export PPTX</button>
      <a href="photobook.html">Public View</a>
    </div>
  </div>

  <div class="page-nav">
    <button id="btn-prev" onclick="goPage(-1)">Prev</button>
    <span class="page-counter" id="page-counter">0 / 0</span>
    <button id="btn-next" onclick="goPage(1)">Next</button>
  </div>

  <div class="fb-layout">
    <nav class="fb-sidebar" id="fb-sidebar">
      <div class="fb-sidebar-title">Countries</div>
      <ul class="fb-sidebar-list" id="fb-sidebar-list"></ul>
    </nav>
    <div class="fb-main">
      <div class="ebook-viewport" id="viewport">
        <div class="loading-wrap">
          <div class="spinner"></div>
          <p>Loading fanbook...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- TOC overlay -->
  <div class="toc-overlay" id="toc-overlay" onclick="toggleTOC()">
    <div class="toc-panel" onclick="event.stopPropagation()">
      <h3>Table of Contents</h3>
      <div id="toc-list"></div>
    </div>
  </div>

  <!-- Lightbox for viewing full images -->
  <div class="lightbox-overlay" id="lightbox" onclick="this.classList.remove('active')">
    <img id="lightbox-img" src="" alt="Full view">
  </div>

// Sort countries: Australia first in Oceania, Thailand first in Asia, then by count descending
function sortCountryCodes(codes, contKey, byContData) {
  return codes.sort((a, b) => {
    if (contKey === 'Oceania') {
      if (a === 'AU') return -1;
      if (b === 'AU') return 1;
    }
    if (contKey === 'Asia') {
      if (a === 'TH') return -1;
      if (b === 'TH') return 1;
    }
    return byContData[b].length - byContData[a].length;
  });
}

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text || '';
  return d.innerHTML;
}

function maskEmail(email) {
  const at = email.indexOf('@');
  if (at <= 2) return email.charAt(0) + '***' + email.substring(at);
  return email.substring(0, 2) + '***' + email.substring(at);
}

function msgHtml(entry) {
  let h = '';
  const msg = String(entry.message || '');
  if (msg) h += `<div class="msg-orig">${esc(msg)}</div>`;
  const lang = String(entry.language || '').toLowerCase();
  const isEnglish = lang === 'english' || lang === 'en';
  const msgEn = String(entry.message_en || '');
  const hasDifferentTranslation = msgEn.trim() && msgEn.trim() !== msg.trim();
  if (hasDifferentTranslation && !isEnglish) {
    h += `<div class="msg-en" style="font-size:0.68rem;color:var(--accent-light);font-style:italic;margin-top:6px;line-height:1.5;">(${esc(msgEn)})</div>`;
  }
  return h;
}

function contactHtml(entry, cssClass) {
  if (!entry.contact_info) return '';
  const c = entry.contact_info.trim();
  if (!c) return '';
  const parts = c.split('|').map(p => p.trim()).filter(Boolean);
  const formatted = parts.map(p => {
    const m = p.match(/^(X|IG|TT|Email|FB|YT|TikTok|Instagram|Twitter|Facebook|YouTube)\s*[:：]\s*(.+)$/i);
    if (!m) return esc(p);
    const label = m[1].toUpperCase();
    const val = m[2].trim();
    if (label === 'X' || label === 'TWITTER') return `X: ${esc(val)}`;
    if (label === 'IG' || label === 'INSTAGRAM') return `IG: ${esc(val)}`;
    if (label === 'TT' || label === 'TIKTOK') return `TikTok: ${esc(val)}`;
    if (label === 'EMAIL') return `Email: ${esc(maskEmail(val))}`;
    if (label === 'FB' || label === 'FACEBOOK') return `FB: ${esc(val)}`;
    if (label === 'YT' || label === 'YOUTUBE') return `YT: ${esc(val)}`;
    return esc(p);
  }).join(' · ');
  return `<div class="${cssClass}">${formatted}</div>`;
}
